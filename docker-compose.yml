version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jaxon-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: jaxon_v2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mcp-mock:
    build: 
      context: ./jaxon-core-api
      dockerfile: src/diagnostics/Dockerfile.mock
    container_name: jaxon-mcp-mock
    ports:
      - "9000:9000"
    environment:
      MCP_MOCK_PORT: 9000

  api:
    build: ./jaxon-core-api
    container_name: jaxon-api
    depends_on:
      - postgres
      - mcp-mock
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:dev_password@postgres:5432/jaxon_v2?sslmode=disable
      MCP_SIDECAR_URL: http://mcp-mock:9000
      MASTER_SALT_HASH: "jaxon_super_secret_salt_64_chars_long_for_forensic_integrity"

volumes:
  postgres_data: