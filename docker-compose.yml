version: '3.8'

services:
  jaxon-db:
    image: postgres:15-alpine
    container_name: jaxon-db
    environment:
      POSTGRES_USER: jaxon_user
      POSTGRES_PASSWORD: jaxon_password
      POSTGRES_DB: jaxon_db
    ports:
      - "5432:5432"
    volumes:
      - jaxon-db-data:/var/lib/postgresql/data

  jaxon-core-api:
    build:
      context: ./jaxon-core-api
      dockerfile: Dockerfile
    container_name: jaxon-core-api
    environment:
      DATABASE_URL: "postgresql://jaxon_user:jaxon_password@jaxon-db:5432/jaxon_db?schema=public"
      JWT_SECRET: "your-secret-key-change-me"
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - jaxon-db

  jaxon-client:
    build:
      context: ./jaxon-client
      dockerfile: Dockerfile
    container_name: jaxon-client
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3001/api/v1"
    ports:
      - "3000:3000"
    depends_on:
      - jaxon-core-api

volumes:
  jaxon-db-data:
